<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Anjali Shrivastava - Full Stack Developer</title>
  <style>
    /* Reset and base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      line-height: 1.6;
      color: #222;
      background: #f0f2f5;
      scroll-behavior: smooth;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Header */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: #4b6cb7; /* blue gradient start */
      background: linear-gradient(135deg, #4b6cb7 0%, #182848 100%);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
      z-index: 1100;
      transition: background 0.3s ease;
    }

    header.scrolled {
      background: #182848;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 60px;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1.2px;
      user-select: none;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
    }

    /* Navigation Links */
    .nav-links {
      list-style: none;
      display: flex;
      gap: 2rem;
    }

    .nav-links li a {
      color: #e0e6f1;
      text-decoration: none;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 25px;
      transition: background-color 0.3s ease, color 0.3s ease;
      box-shadow: 0 0 0 transparent;
      display: inline-block;
    }

    .nav-links li a:hover,
    .nav-links li a:focus {
      background-color: rgba(255, 255, 255, 0.25);
      color: #fff;
      box-shadow: 0 4px 10px rgba(255, 255, 255, 0.3);
      outline: none;
      transform: translateY(-3px);
    }

    /* Hamburger Menu for Mobile */
    .hamburger {
      display: none;
      flex-direction: column;
      cursor: pointer;
      width: 28px;
      height: 22px;
      justify-content: space-between;
    }

    .hamburger span {
      height: 3px;
      width: 100%;
      background: #fff;
      border-radius: 2px;
      transition: all 0.3s ease;
    }

    /* Mobile Nav Active */
    .nav-active {
      display: flex !important;
      flex-direction: column;
      position: fixed;
      top: 60px;
      right: 0;
      background: #182848;
      width: 200px;
      height: calc(100vh - 60px);
      padding-top: 2rem;
      box-shadow: -4px 0 15px rgba(0, 0, 0, 0.3);
      z-index: 1050;
      animation: slideIn 0.3s forwards;
    }

    @keyframes slideIn {
      from {
        right: -220px;
        opacity: 0;
      }
      to {
        right: 0;
        opacity: 1;
      }
    }

    /* Hero Section */
    .hero {
      background: linear-gradient(135deg, #4b6cb7 0%, #182848 70%, #6a11cb 100%);
      color: #fff;
      text-align: center;
      padding: 160px 20px 120px;
      position: relative;
      overflow: hidden;
      user-select: none;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -50px;
      left: -50px;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle at center, rgba(255, 255, 255, 0.15), transparent 70%);
      border-radius: 50%;
      animation: float 10s ease-in-out infinite;
      z-index: 1;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) rotate(0deg);
      }
      50% {
        transform: translateY(-25px) rotate(180deg);
      }
    }

    .profile-img {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 5px solid #fff;
      margin-bottom: 1.5rem;
      object-fit: cover;
      box-shadow: 0 8px 20px rgba(255, 255, 255, 0.4);
      position: relative;
      z-index: 2;
      transition: transform 0.3s ease;
    }

    .profile-img:hover {
      transform: scale(1.05) rotate(3deg);
      box-shadow: 0 12px 30px rgba(255, 255, 255, 0.6);
    }

    .hero h1 {
      font-size: 3.2rem;
      margin-bottom: 1rem;
      font-weight: 700;
      text-shadow: 0 3px 8px rgba(0, 0, 0, 0.4);
      position: relative;
      z-index: 2;
    }

    .hero p {
      font-size: 1.25rem;
      max-width: 650px;
      margin: 0 auto 2.5rem;
      line-height: 1.5;
      position: relative;
      z-index: 2;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    .btn {
      display: inline-block;
      padding: 14px 36px;
      background: linear-gradient(45deg, #6a11cb, #2575fc);
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-weight: 700;
      margin: 0 12px 12px 12px;
      box-shadow: 0 6px 20px rgba(106, 17, 203, 0.5);
      transition: all 0.3s ease;
      position: relative;
      z-index: 2;
      user-select: none;
    }

    .btn:hover,
    .btn:focus {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(106, 17, 203, 0.7);
      outline: none;
    }

    .btn-outline {
      background: transparent;
      border: 2px solid white;
      box-shadow: none;
    }

    .btn-outline:hover,
    .btn-outline:focus {
      background: rgba(255, 255, 255, 0.25);
      color: white;
      box-shadow: 0 8px 25px rgba(255, 255, 255, 0.5);
    }

    /* Sections */
    .section {
      padding: 80px 0;
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.7s ease;
    }

    .section.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .section-title {
      text-align: center;
      font-size: 2.8rem;
      margin-bottom: 3rem;
      color: #182848;
      font-weight: 700;
      letter-spacing: 1px;
      user-select: none;
    }

    /* About Section */
    .about {
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(24, 40, 72, 0.1);
      padding: 60px 30px;
      max-width: 900px;
      margin: 0 auto;
    }

    .about-content p {
      font-size: 1.15rem;
      margin-bottom: 1.8rem;
      color: #444;
      line-height: 1.6;
      user-select: text;
    }

    .contact-info {
      display: flex;
      justify-content: space-around;
      margin-top: 3rem;
      flex-wrap: wrap;
      gap: 1.5rem;
    }

    .contact-item {
      background: #f7f9fc;
      border-radius: 12px;
      padding: 1.8rem 2rem;
      flex: 1 1 200px;
      box-shadow: 0 6px 15px rgba(24, 40, 72, 0.05);
      text-align: center;
      user-select: none;
      transition: background-color 0.3s ease;
    }

    .contact-item:hover {
      background-color: #e1e8ff;
    }

    .contact-item h3 {
      color: #4b6cb7;
      margin-bottom: 0.6rem;
      font-weight: 700;
      font-size: 1.3rem;
    }

    .contact-item p {
      color: #555;
      font-size: 1rem;
      user-select: text;
    }

    /* Skills Section */
    .skills {
      background: #f9fbff;
      border-radius: 15px;
      padding: 60px 30px;
      box-shadow: 0 10px 30px rgba(24, 40, 72, 0.05);
    }

    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2.5rem;
    }

    .skill-card {
      background: white;
      padding: 2rem 2.5rem;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(75, 108, 183, 0.1);
      border: 1px solid rgba(75, 108, 183, 0.15);
      transition: all 0.3s ease;
      user-select: none;
    }

    .skill-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 50px rgba(75, 108, 183, 0.25);
    }

    .skill-card h3 {
      color: #4b6cb7;
      margin-bottom: 1.2rem;
      font-weight: 700;
      font-size: 1.5rem;
    }

    .skill-item {
      margin: 1.2rem 0;
    }

    .skill-name {
      display: flex;
      justify-content: space-between;
      font-weight: 600;
      color: #333;
      margin-bottom: 0.4rem;
      user-select: text;
    }

    .skill-bar {
      background: #dbe4ff;
      height: 10px;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .skill-progress {
      background: linear-gradient(45deg, #6a11cb, #2575fc);
      height: 100%;
      border-radius: 6px;
      transition: width 0.6s ease;
    }

    /* Experience Section */
    .experience {
      background: #fff;
      border-radius: 15px;
      padding: 60px 30px;
      box-shadow: 0 10px 30px rgba(24, 40, 72, 0.1);
      max-width: 900px;
      margin: 0 auto;
    }

    .timeline {
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    .timeline-item {
      background: white;
      padding: 2rem 2.5rem;
      border-radius: 15px;
      border-left: 6px solid #4b6cb7;
      box-shadow: 0 8px 25px rgba(75, 108, 183, 0.1);
      transition: all 0.3s ease;
      user-select: none;
    }

    .timeline-item:hover {
      transform: translateX(8px);
      box-shadow: 0 12px 40px rgba(75, 108, 183, 0.25);
    }

    .timeline-item h3 {
      color: #4b6cb7;
      margin-bottom: 0.5rem;
      font-weight: 700;
      font-size: 1.5rem;
    }

    .company {
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #222;
      user-select: text;
    }

    .duration {
      background: linear-gradient(45deg, #6a11cb, #2575fc);
      color: white;
      font-size: 0.9rem;
      padding: 0.3rem 1rem;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 1rem;
      user-select: none;
    }

    .timeline-item p {
      color: #444;
      line-height: 1.5;
      user-select: text;
    }

    .projects {
      margin-top: 1.5rem;
    }

    .project {
      background: #f0f4ff;
      padding: 1.2rem 1.5rem;
      border-radius: 12px;
      margin-bottom: 1rem;
      border-left: 5px solid #4b6cb7;
      user-select: none;
      transition: background-color 0.3s ease;
    }

    .project:hover {
      background-color: #dbe4ff;
    }

    .project h4 {
      color: #4b6cb7;
      margin-bottom: 0.4rem;
      font-weight: 700;
      font-size: 1.2rem;
    }

    .project p {
      font-size: 0.95rem;
      color: #333;
      user-select: text;
    }

    .project a {
      color: #4b6cb7;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      user-select: text;
    }

    .project a:hover,
    .project a:focus {
      text-decoration: underline;
      outline: none;
    }

    /* Contact Section */
    .contact {
      background: linear-gradient(135deg, #4b6cb7 0%, #182848 100%);
      color: white;
      text-align: center;
      padding: 80px 20px;
      user-select: none;
    }

    .contact .section-title {
      color: #fff;
      font-weight: 700;
      font-size: 2.8rem;
      margin-bottom: 1rem;
    }

    .contact p {
      max-width: 600px;
      margin: 0 auto 2rem;
      font-size: 1.2rem;
      color: #d1d9ff;
      user-select: text;
    }

    .contact-buttons {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .contact-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 16px 32px;
      background: white;
      color: #4b6cb7;
      text-decoration: none;
      border-radius: 30px;
      font-weight: 700;
      font-size: 1rem;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
      transition: all 0.3s ease;
      user-select: none;
    }

    .contact-btn:hover,
    .contact-btn:focus {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      outline: none;
    }

    /* Footer */
    footer {
      background: #182848;
      color: #cfd8ff;
      text-align: center;
      padding: 1.8rem 20px;
      font-size: 0.95rem;
      user-select: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    /* Responsive */
    @media (max-width: 900px) {
      .skills-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 600px) {
      .skills-grid {
        grid-template-columns: 1fr;
      }

      .nav-links {
        display: none;
      }

      .hamburger {
        display: flex;
      }

      .contact-buttons {
        flex-direction: column;
        gap: 1rem;
      }
